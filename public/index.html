<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheoTown Plugin Monitor Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-gray-800 pb-6 mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-emerald-400">TheoTown Plugin Monitor</h1>
                <p class="text-gray-400 mt-1 text-sm md:text-base">Hệ thống theo dõi tự động số lượng lượt tải xuống và trạng thái đánh giá forum.</p>
            </div>
            <button onclick="refreshAll()" id="btnRefresh" class="w-full md:w-auto bg-emerald-600 hover:bg-emerald-500 text-white font-medium px-5 py-2.5 rounded-lg transition-colors shadow-lg shadow-emerald-900/20 cursor-pointer">
                Làm mới toàn bộ dữ liệu
            </button>
        </div>

        <div class="bg-gradient-to-r from-gray-800 to-gray-800/80 rounded-xl p-5 md:p-6 mb-8 border border-gray-700 shadow-xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-1">Tổng lượt tải toàn hệ thống</h2>
                <div class="flex items-baseline gap-3">
                    <span id="totalDownloadsNum" class="text-4xl font-bold text-emerald-400">0</span>
                    <span id="totalDiffNum" class="text-sm font-bold text-emerald-400 bg-emerald-900/40 px-2.5 py-1 rounded-md border border-emerald-800/50 hidden shadow-sm">
                        +0
                    </span>
                </div>
            </div>
            <button onclick="saveBaseline()" class="w-full md:w-auto bg-gray-700 hover:bg-gray-600 text-gray-200 font-medium px-5 py-2.5 rounded-lg transition-colors border border-gray-600 shadow-lg cursor-pointer flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Chốt mốc đếm mới
            </button>
        </div>

        <div class="bg-gray-800 rounded-xl p-4 md:p-6 mb-8 border border-gray-700 shadow-xl">
            <h2 class="text-lg font-semibold mb-4 text-gray-200">Thêm Plugin Mới Cần Theo Dõi</h2>
            <form id="addForm" class="flex flex-col sm:flex-row gap-3">
                <input type="url" id="pluginUrl" required placeholder="Dán link plugin trên forum TheoTown vào đây..." 
                       class="flex-1 bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-gray-200 focus:outline-none focus:border-emerald-500 placeholder-gray-500">
                <button type="submit" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-lg font-medium transition-colors whitespace-nowrap cursor-pointer">
                    + Thêm vào danh sách
                </button>
            </form>
        </div>

        <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse block md:table">
                    <thead class="hidden md:table-header-group">
                        <tr class="bg-gray-700/50 text-gray-300 text-sm font-semibold uppercase tracking-wider border-b border-gray-700">
                            <th class="p-4">Tên Plugin / Đường dẫn</th>
                            <th class="p-4">Lượt tải về</th>
                            <th class="p-4">Đánh giá</th>
                            <th class="p-4">Trạng thái kết nối</th>
                            <th class="p-4">Cập nhật cuối</th>
                            <th class="p-4 text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="pluginsTableBody" class="block md:table-row-group divide-y divide-gray-700/60 text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // MỚI: Biến cục bộ để lưu dữ liệu tải về phục vụ việc chốt mốc
        let globalPluginsData = [];

        document.addEventListener('DOMContentLoaded', fetchPlugins);
        document.getElementById('addForm').addEventListener('submit', addPlugin);

        async function fetchPlugins() {
            const res = await fetch('/api/plugins');
            const data = await res.json();
            globalPluginsData = data; // Lưu lại trạng thái

            const tbody = document.getElementById('pluginsTableBody');
            tbody.innerHTML = '';

            // MỚI: Lấy mốc đã lưu từ LocalStorage, khởi tạo các biến tính Tổng
            const baseline = JSON.parse(localStorage.getItem('pluginBaseline')) || {};
            let totalCurrent = 0;
            let totalBaseline = 0;

            if (data.length === 0) {
                tbody.innerHTML = `<tr class="block md:table-row"><td colspan="6" class="block md:table-cell p-8 text-center text-gray-500">Hiện tại chưa có link plugin nào được cấu hình theo dõi. Hãy thêm link ở trên!</td></tr>`;
                document.getElementById('totalDownloadsNum').innerText = '0';
                document.getElementById('totalDiffNum').classList.add('hidden');
                return;
            }

            data.forEach(p => {
                // MỚI: Tách con số chính xác từ chuỗi (ví dụ: "1,234" -> 1234)
                const currentNum = parseInt(String(p.downloads).replace(/\D/g, '')) || 0;
                totalCurrent += currentNum;

                // MỚI: Tính mức chênh lệch lượt tải cho từng plugin
                let diffHtml = '';
                if (baseline[p.id] !== undefined) {
                    const diff = currentNum - baseline[p.id];
                    totalBaseline += baseline[p.id];
                    if (diff > 0) {
                        diffHtml = `<span class="text-xs text-emerald-400 font-bold bg-emerald-900/50 px-1.5 py-0.5 rounded ml-2 shadow border border-emerald-800/60">↑ ${diff.toLocaleString('vi-VN')}</span>`;
                    }
                } else {
                    totalBaseline += currentNum; // Nếu chưa có mốc thì mốc = hiện tại
                }

                tbody.innerHTML += `
                    <tr class="block md:table-row hover:bg-gray-700/30 transition-colors p-4 md:p-0">
                        <td class="block md:table-cell md:p-4 font-medium mb-3 md:mb-0 max-w-full md:max-w-xs truncate md:truncate-none">
                            <span class="inline-block md:hidden text-gray-400 text-xs font-semibold uppercase mb-1">Tên Plugin / Đường dẫn</span>
                            <a href="${p.url}" target="_blank" class="text-blue-400 hover:underline block truncate md:whitespace-normal">${p.title}</a>
                            <span class="text-xs text-gray-500 block truncate mt-0.5">${p.url}</span>
                        </td>
                        
                        <td class="flex md:table-cell justify-between items-center py-2 md:p-4 border-t border-gray-700/30 md:border-t-0">
                            <span class="inline-block md:hidden text-gray-400 text-xs font-semibold uppercase">Lượt tải về:</span>
                            <div class="flex items-center">
                                <span class="text-emerald-400 font-bold text-base md:text-sm">${p.downloads}</span>
                                ${diffHtml}
                            </div>
                        </td>
                        
                        <td class="flex md:table-cell justify-between items-center py-2 md:p-4">
                            <span class="inline-block md:hidden text-gray-400 text-xs font-semibold uppercase">Đánh giá:</span>
                            <span class="px-2 py-1 rounded text-xs font-semibold bg-gray-900 text-amber-400">${p.rating}</span>
                        </td>
                        
                        <td class="flex md:table-cell justify-between items-center py-2 md:p-4">
                            <span class="inline-block md:hidden text-gray-400 text-xs font-semibold uppercase">Trạng thái:</span>
                            <span class="text-xs">${p.status}</span>
                        </td>
                        
                        <td class="flex md:table-cell justify-between items-center py-2 md:p-4">
                            <span class="inline-block md:hidden text-gray-400 text-xs font-semibold uppercase">Cập nhật cuối:</span>
                            <span class="text-gray-400 text-xs">${p.lastUpdated}</span>
                        </td>
                        
                        <td class="block md:table-cell py-3 md:p-4 text-center mt-2 md:mt-0">
                            <button onclick="deletePlugin('${p.id}')" class="w-full md:w-auto bg-red-900/30 md:bg-transparent py-2.5 md:py-0 rounded-lg md:rounded-none text-red-400 hover:text-red-300 font-medium cursor-pointer transition-colors border border-red-900/50 md:border-none">
                                Xóa
                            </button>
                        </td>
                    </tr>
                `;
            });

            // MỚI: Hiển thị Tổng số lượt tải lên giao diện
            document.getElementById('totalDownloadsNum').innerText = totalCurrent.toLocaleString('vi-VN');
            
            // Hiển thị Tổng lượt tăng
            const totalDiff = totalCurrent - totalBaseline;
            const diffEl = document.getElementById('totalDiffNum');
            if (totalDiff > 0) {
                diffEl.innerText = `↑ ${totalDiff.toLocaleString('vi-VN')}`;
                diffEl.classList.remove('hidden');
            } else {
                diffEl.classList.add('hidden');
            }
        }

        // MỚI: Hàm xử lý khi bấm nút "Chốt mốc đếm mới"
        function saveBaseline() {
            const newBaseline = {};
            globalPluginsData.forEach(p => {
                newBaseline[p.id] = parseInt(String(p.downloads).replace(/\D/g, '')) || 0;
            });
            localStorage.setItem('pluginBaseline', JSON.stringify(newBaseline));
            
            alert('✅ Đã chốt mốc đếm thành công!\nTừ giờ hệ thống sẽ tự theo dõi xem có bao nhiêu lượt tải tăng thêm so với con số hiện tại.');
            fetchPlugins(); // Tải lại bảng để reset các nhãn +
        }

        async function addPlugin(e) {
            e.preventDefault();
            const urlInput = document.getElementById('pluginUrl');
            const url = urlInput.value;

            const res = await fetch('/api/plugins', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });

            if(res.ok) {
                urlInput.value = '';
                fetchPlugins();
            } else {
                const err = await res.json();
                alert(err.error || 'Có lỗi xảy ra khi thêm URL');
            }
        }

        async function deletePlugin(id) {
            if (confirm('Bạn có chắc chắn muốn ngừng theo dõi plugin này không?')) {
                await fetch(`/api/plugins/${id}`, { method: 'DELETE' });
                fetchPlugins();
            }
        }

        async function refreshAll() {
            const btn = document.getElementById('btnRefresh');
            btn.disabled = true;
            btn.innerText = 'Đang đồng bộ quét web...';
            btn.classList.add('opacity-50');

            await fetch('/api/plugins/refresh', { method: 'POST' });
            
            btn.disabled = false;
            btn.innerText = 'Làm mới toàn bộ dữ liệu';
            btn.classList.remove('opacity-50');
            fetchPlugins();
        }
    </script>
</body>
</html>
